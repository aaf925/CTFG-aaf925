<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A00E0"/>
      <stop offset="100%" style="stop-color:#8E2DE2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  
  <!-- Casa icon -->
  <path d="M200 80 L100 160 L100 300 L300 300 L300 160 Z" 
        fill="none" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round"/>
  <path d="M160 300 L160 220 L240 220 L240 300" 
        fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Voice waves -->
  <path d="M130 200 Q140 180 130 160" fill="none" stroke="#8E2DE2" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M115 215 Q130 185 115 155" fill="none" stroke="#8E2DE2" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Wifi/network symbol -->
  <path d="M290 120 Q310 140 290 160" fill="none" stroke="#4A00E0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M275 105 Q305 145 275 175" fill="none" stroke="#4A00E0" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- App name -->
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="28" font-weight="bold" fill="white">Asistente SmartHome</text>
</svg>